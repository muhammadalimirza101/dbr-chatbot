[project]
name = "dbr-backend"
version = "0.1.0"
description = "DBR WhatsApp AI Chatbot backend (FastAPI)"
requires-python = ">=3.12"

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "ASYNC", "S"]
ignore = ["S101"]  # assert allowed in tests

[tool.ruff.lint.per-file-ignores]
# autogenerated migrations keep Alembic's own formatting
"alembic/versions/*" = ["E501"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
